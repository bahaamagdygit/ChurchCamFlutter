name: church_cam_flutter
description: Church Live Stream Camera App - Flutter Version
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera and vision
  camera: ^0.10.5+5
  image: ^4.0.0

  # Networking
  web_socket_channel: ^2.4.0

  # State management
  provider: ^6.0.0

  # Permissions
  permission_handler: ^12.0.1

  # Storage
  shared_preferences: ^2.2.0

  # UI
  flutter_svg: ^2.0.0

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
