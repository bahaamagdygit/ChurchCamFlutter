name: church_cam_flutter
description: Church Live Stream Camera App - Flutter Version
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera capture + preview
  camera: ^0.11.0

  # JPEG encode / image conversion (YUV/BGRA -> JPEG)
  image: ^4.2.0

  # Runtime permissions (camera)
  permission_handler: ^11.3.1

  # Keep the screen awake while streaming
  wakelock_plus: ^1.2.8

  # QR code scanning (pair with the desktop)
  mobile_scanner: ^5.2.3

  # Persist saved connections + settings
  shared_preferences: ^2.3.2

  # Accelerometer-based device orientation
  sensors_plus: ^6.0.1

  # Battery level for the metrics HUD / desktop device list
  battery_plus: ^6.0.0

  # Networking
  web_socket_channel: ^2.4.0

  # State management
  provider: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
